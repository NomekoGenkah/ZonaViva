data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_split: 0.8

seq:
  frame_skip: 5         # extract every Nth frame (1 = all frames)

model:
  name: yolov8n.pt      # base weights (downloaded automatically on first run)
  epochs: 50
  batch_size: 16
  img_size: 640
  device: auto          # auto | cpu | 0 | 1  (GPU index)

output:
  runs_dir: runs
  models_dir: models
